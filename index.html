<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bondabazzar — Campaign Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #1e1e2e;
      --accent: #f97316;
      --accent2: #fb923c;
      --reject: #ef4444;
      --pending: #eab308;
      --success: #22c55e;
      --text: #e2e8f0;
      --muted: #64748b;
      --subtle: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    nav {
      position: relative;
      z-index: 10;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #f97316, #fb923c, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .nav-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 100px;
      letter-spacing: 1px;
    }

    /* MAIN */
    main {
      position: relative;
      z-index: 5;
      max-width: 520px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: #fff;
    }

    .subline {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
      font-weight: 300;
    }

    /* INPUT CARD */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .input-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,0.4), transparent);
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      background: #0d0d15;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 18px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    input::placeholder { color: #334155; letter-spacing: 0; }

    .track-btn {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .track-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(249,115,22,0.3);
    }

    .track-btn:active { transform: translateY(0); }

    /* RESULT CARD */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      display: none;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
      position: relative;
      overflow: hidden;
    }

    .result-card.visible { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* User header */
    .user-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      flex-shrink: 0;
    }

    .avatar.reject-av { background: rgba(239,68,68,0.15); color: #ef4444; border: 1.5px solid rgba(239,68,68,0.3); }

    .user-info { flex: 1; }
    .user-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; color: #fff; }
    .user-phone { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 100px;
      letter-spacing: 0.5px;
    }

    .badge-reject { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Reason box */
    .reason-box {
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 22px;
      border-left: 3px solid;
    }

    .reason-box.reject { background: rgba(239,68,68,0.06); border-color: #ef4444; }

    .reason-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .reason-box.reject .reason-label { color: #ef4444; }

    .reason-text { font-size: 14px; color: var(--text); line-height: 1.5; }
    .reason-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Timeline */
    .timeline { position: relative; }

    .tl-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .tl-item {
      display: flex;
      gap: 14px;
      position: relative;
      padding-bottom: 18px;
    }

    .tl-item:last-child { padding-bottom: 0; }

    .tl-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 16px;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .tl-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-top: 2px;
      flex-shrink: 0;
      position: relative;
    }

    .tl-dot.active {
      background: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.2);
    }

    .tl-dot.done {
      background: transparent;
      border: 2px solid #22c55e;
    }

    .tl-dot.inactive {
      background: transparent;
      border: 2px solid var(--border);
    }

    .tl-content { flex: 1; }
    .tl-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .tl-title.muted { color: var(--muted); font-weight: 400; }
    .tl-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 13px;
      color: #ef4444;
      display: none;
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
    }

    .error-msg.visible { display: block; }

    /* Footer */
    footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 32px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #1e293b;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div class="noise"></div>

<nav>
  <span class="brand">Bondabazzar</span>
  <span class="nav-tag">TRACKER v2.0</span>
</nav>

<main>
  <h1 class="headline">Campaign Status</h1>
  <p class="subline">Enter your registered mobile number to track your cashback status</p>

  <div class="input-card">
    <div class="input-row">
      <input type="text" id="trackInput" placeholder="Enter mobile number..." maxlength="15" />
      <button class="track-btn" onclick="trackStatus()">TRACK →</button>
    </div>
    <div class="error-msg" id="errorMsg">⚠ No record found for this number.</div>
  </div>

  <div class="result-card" id="resultCard">
    <!-- Filled by JS -->
  </div>
</main>

<footer>© 2026 BONDABAZZAR · ALL RIGHTS RESERVED</footer>

<script>
  const data = {
    "7982782164": {
      name: "Satyam Kumar",
      phone: "7982782164",
      initials: "SK",
      status: "rejected",
      statusLabel: "REJECTED",
      reasonTitle: "Cashback Rejected",
      reasonDetail: "Photo update was delayed. Campaign requires timely photo submission for cashback eligibility.",
      timeline: [
        { label: "Final Decision: Cashback Rejected", date: "May 09, 2026 · 12:15 PM", type: "active" },
        { label: "Photo Submission Deadline Missed", date: "May 08, 2026 · 06:00 PM", type: "inactive" },
        { label: "Campaign Verified", date: "May 08, 2026 · 10:30 AM", type: "done" },
        { label: "Application Received", date: "May 07, 2026 · 09:00 AM", type: "done" },
      ]
    },
    "8920740688": {
      name: "Harsh Upadhyay",
      phone: "8920740688",
      initials: "HU",
      status: "rejected",
      statusLabel: "REJECTED",
      reasonTitle: "Cashback Rejected",
      reasonDetail: "Cashback could not be processed. Please contact support for further details or re-application.",
      timeline: [
        { label: "Final Decision: Cashback Rejected", date: "May 09, 2026 · 01:00 PM", type: "active" },
        { label: "Campaign Verified", date: "May 08, 2026 · 11:00 AM", type: "done" },
        { label: "Application Received", date: "May 07, 2026 · 10:00 AM", type: "done" },
      ]
    }
  };

  function trackStatus() {
    const input = document.getElementById('trackInput').value.trim();
    const card = document.getElementById('resultCard');
    const err = document.getElementById('errorMsg');

    card.classList.remove('visible');
    err.classList.remove('visible');

    if (!input) return;

    const entry = data[input];
    if (!entry) {
      err.classList.add('visible');
      return;
    }

    card.innerHTML = buildCard(entry);
    card.classList.add('visible');
  }

  function buildCard(e) {
    const dotMap = { active: 'active', done: 'done', inactive: 'inactive' };
    const tlItems = e.timeline.map(t => `
      <div class="tl-item">
        <div class="tl-dot ${dotMap[t.type]}"></div>
        <div class="tl-content">
          <div class="tl-title ${t.type === 'inactive' ? 'muted' : ''}">${t.label}</div>
          <div class="tl-date">${t.date}</div>
        </div>
      </div>
    `).join('');

    return `
      <div class="user-header">
        <div class="avatar reject-av">${e.initials}</div>
        <div class="user-info">
          <div class="user-name">${e.name}</div>
          <div class="user-phone">+91 ${e.phone}</div>
        </div>
        <div class="status-badge badge-reject">
          <div class="badge-dot"></div>
          ${e.statusLabel}
        </div>
      </div>

      <div class="reason-box reject">
        <div class="reason-label">Reason</div>
        <div class="reason-text">${e.reasonTitle}</div>
        <div class="reason-sub">${e.reasonDetail}</div>
      </div>

      <div class="timeline">
        <div class="tl-label">Activity Log</div>
        ${tlItems}
      </div>
    `;
  }

  // Allow Enter key
  document.getElementById('trackInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') trackStatus();
  });
</script>
</body>
  </html>
